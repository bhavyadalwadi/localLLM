services:
  idea-capture:
    image: python:3.12-slim
    container_name: idea-capture
    restart: unless-stopped
    working_dir: /workspace
    command:
      - python3
      - /workspace/scripts/idea_capture_service.py
      - --host
      - 0.0.0.0
      - --port
      - "${IDEA_CAPTURE_PORT:-8790}"
      - --notes-dir
      - /workspace/notes/idea-inbox
      - --model
      - "${IDEA_CAPTURE_MODEL:-llama3.1:8b}"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - IDEA_CAPTURE_API_TOKEN=${IDEA_CAPTURE_API_TOKEN:-}
    ports:
      - "${IDEA_CAPTURE_PORT:-8790}:${IDEA_CAPTURE_PORT:-8790}"
    volumes:
      - ./:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
