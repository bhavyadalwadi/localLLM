<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <rect width="1440" height="900" fill="#0B1220"/>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111B2E"/>
      <stop offset="100%" stop-color="#16243B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <text x="96" y="100" fill="#F8FAFC" font-size="46" font-family="Arial, sans-serif" font-weight="700">Local AI Node</text>
  <text x="96" y="146" fill="#94A3B8" font-size="24" font-family="Arial, sans-serif">Target-host-first deployment path for Open WebUI, Ollama, backups, and model routing.</text>

  <rect x="96" y="220" width="280" height="180" rx="28" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  <text x="128" y="272" fill="#E2E8F0" font-size="28" font-family="Arial, sans-serif" font-weight="700">Operator</text>
  <text x="128" y="316" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">Runs bootstrap and</text>
  <text x="128" y="346" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">validation scripts</text>
  <text x="128" y="386" fill="#2DD4BF" font-size="20" font-family="Arial, sans-serif">preflight-target-host.sh</text>

  <rect x="484" y="190" width="430" height="250" rx="32" fill="url(#panel)" stroke="#2DD4BF" stroke-width="2"/>
  <text x="522" y="248" fill="#F8FAFC" font-size="32" font-family="Arial, sans-serif" font-weight="700">Open WebUI</text>
  <text x="522" y="288" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">Docker Compose service</text>
  <rect x="522" y="320" width="160" height="44" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="547" y="348" fill="#93C5FD" font-size="18" font-family="Arial, sans-serif">chat UI</text>
  <rect x="700" y="320" width="180" height="44" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="724" y="348" fill="#93C5FD" font-size="18" font-family="Arial, sans-serif">admin controls</text>
  <rect x="522" y="380" width="220" height="44" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="548" y="408" fill="#93C5FD" font-size="18" font-family="Arial, sans-serif">connection toggles</text>

  <rect x="1022" y="220" width="320" height="180" rx="28" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  <text x="1054" y="272" fill="#E2E8F0" font-size="28" font-family="Arial, sans-serif" font-weight="700">Ollama Runtime</text>
  <text x="1054" y="316" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">Host-first default</text>
  <text x="1054" y="346" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">or optional Docker mode</text>
  <text x="1054" y="386" fill="#2DD4BF" font-size="20" font-family="Arial, sans-serif">OLLAMA_BASE_URL</text>

  <rect x="484" y="540" width="380" height="200" rx="28" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  <text x="520" y="594" fill="#E2E8F0" font-size="28" font-family="Arial, sans-serif" font-weight="700">Model Roles</text>
  <text x="520" y="634" fill="#CBD5E1" font-size="21" font-family="Arial, sans-serif">llama3.1:8b for default chat</text>
  <text x="520" y="664" fill="#CBD5E1" font-size="21" font-family="Arial, sans-serif">deepseek-coder for coding</text>
  <text x="520" y="694" fill="#CBD5E1" font-size="21" font-family="Arial, sans-serif">phi3 as lightweight fallback</text>

  <rect x="922" y="540" width="420" height="200" rx="28" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  <text x="958" y="594" fill="#E2E8F0" font-size="28" font-family="Arial, sans-serif" font-weight="700">Durable Ops Layer</text>
  <text x="958" y="634" fill="#CBD5E1" font-size="21" font-family="Arial, sans-serif">backup-ollama-store.sh</text>
  <text x="958" y="664" fill="#CBD5E1" font-size="21" font-family="Arial, sans-serif">verify-ollama-models.sh</text>
  <text x="958" y="694" fill="#CBD5E1" font-size="21" font-family="Arial, sans-serif">target-host-first-pass.md</text>

  <path d="M376 310H454" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M914 310H992" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M699 440V506" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M948 440V506" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="454" cy="310" r="8" fill="#60A5FA"/>
  <circle cx="992" cy="310" r="8" fill="#60A5FA"/>
  <circle cx="699" cy="506" r="8" fill="#60A5FA"/>
  <circle cx="948" cy="506" r="8" fill="#60A5FA"/>
</svg>
